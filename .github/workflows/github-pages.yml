name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLIC_BUCKET: ${{ secrets.VITE_SUPABASE_PUBLIC_BUCKET }}
      VITE_GITHUB_COMMENTS_REPO: ${{ secrets.VITE_GITHUB_COMMENTS_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reading import verification
        run: npm run verify:reading-import

      - name: Build
        run: npm run build

      - name: Dist smoke test
        run: npm run smoke:dist

      - name: Comments bridge verification
        run: npm run verify:comments

      - name: Release audit
        run: npm run audit:release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

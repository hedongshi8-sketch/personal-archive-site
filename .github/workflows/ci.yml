name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Reading import verification
        run: npm run verify:reading-import

      - name: Reading owner flow verification
        run: npm run verify:reading-owner-flow

      - name: Music owner flow verification
        run: npm run verify:music-owner-flow

      - name: Build
        run: npm run build

      - name: Dist smoke test
        run: npm run smoke:dist

      - name: Comments bridge verification
        run: npm run verify:comments

      - name: Release audit
        run: npm run audit:release

      - name: Pack static release
        run: npm run pack:static

      - name: Upload static release
        uses: actions/upload-artifact@v4
        with:
          name: personal-archive-site-static
          path: release/
          if-no-files-found: error

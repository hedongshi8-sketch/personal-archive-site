<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏小镇 - 可交互原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="prototype-shell">
      <aside class="prototype-notes">
        <h1>游戏小镇</h1>
        <p>微信小程序竖屏交互原型</p>
        <div class="note-card">
          <strong>核心链路</strong>
          <span>登录 → 创建分身 → 新手引导 → 小镇 → 地图/冒险/背包/角色/招募/战斗</span>
        </div>
        <div class="note-card">
          <strong>操作提示</strong>
          <span>点击建筑、NPC、地图地域、背包物品、角色页签，均会触发状态变化或跳转。</span>
        </div>
      </aside>

      <section class="phone" aria-label="游戏小镇手机原型">
        <div class="status-bar">
          <span>09:41</span>
          <span>梦想大陆</span>
          <span>4G 100%</span>
        </div>

        <div id="app" class="screen"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
